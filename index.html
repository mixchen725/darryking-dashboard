<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>大大力分析儀表板 v16.0 - 穩定版</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dk-bg-yellow { background-color: #ffcc00; }
        .dk-border-yellow { border-color: #ffcc00; }
    </style>
</head>
<body class="bg-gray-50 p-4 text-xs">
    <div id="app" class="max-w-7xl mx-auto space-y-4">
        <header class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-black flex justify-between items-center">
            <h1 class="font-black">📊 大大力業績分析</h1>
            <button @click="fetchCloudData" class="bg-black text-white px-3 py-1 rounded">🔄 同步</button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>昨日預約/取消</div><div class="font-black text-sm">{{ latestBooking }} / <span class="text-red-500">{{ latestCancel }}</span></div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>月YoY</div><div class="font-black text-sm">{{ monthYoY }}%</div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>取消率</div><div class="font-black text-sm text-red-500">{{ cancelRate }}%</div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>達成率</div><div class="font-black text-sm">{{ achievement }}%</div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>落差值</div><div class="font-black text-sm">{{ gap }}%</div></div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm h-64">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <script>
        const GIST_ID = "3cd74e6ce0f0041ea785c24fb7d210c9";
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const history = ref({});
                const base2025 = { '07-01': 52, '07-02': 50, '07-03': 63, '07-04': 56, '07-05': 65, '07-06': 53, '07-07': 58, '07-08': 61, '07-09': 58 };

                const fetchCloudData = async () => {
                    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                    const d = await res.json();
                    history.value = JSON.parse(d.files["data.json"].content);
                    updateChart();
                };

                let chart = null;
                const updateChart = () => {
                    if(!chart) return;
                    const days = Object.keys(history.value).sort();
                    chart.data.labels = days.map(d => d.split('-')[1]);
                    chart.data.datasets[0].data = days.map(d => history.value[d].b2026);
                    chart.data.datasets[1].data = days.map(d => base2025[d] || 0);
                    chart.update();
                };

                onMounted(() => {
                    const ctx = document.getElementById('lineChart').getContext('2d');
                    chart = new Chart(ctx, { 
                        type: 'line', 
                        data: { labels: [], datasets: [
                            { label: '2026', data: [], borderColor: '#ffcc00', borderWidth: 3 },
                            { label: '2025', data: [], borderColor: '#111111', borderWidth: 2 }
                        ]},
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                    fetchCloudData();
                });

                return { 
                    fetchCloudData,
                    latestBooking: computed(() => Object.values(history.value).slice(-1)[0]?.b2026 || '-'),
                    latestCancel: computed(() => Object.values(history.value).slice(-1)[0]?.c2026 || '-'),
                    monthYoY: computed(() => '0.0'),
                    cancelRate: computed(() => '0.0'),
                    achievement: computed(() => '0.0'),
                    gap: computed(() => '0.0')
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
