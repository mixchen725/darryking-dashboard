<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>大大力業績分析儀表板</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-4">
    <div id="app" class="max-w-7xl mx-auto space-y-4">
        <button @click="isExpanded = !isExpanded" class="bg-black text-white px-4 py-2 rounded font-black">
            {{ isExpanded ? '收合月曆' : '展開月曆' }}
        </button>

        <div v-show="isExpanded" class="grid grid-cols-7 gap-1 bg-gray-200 p-2 rounded-lg border">
            <div v-for="w in ['日','一','二','三','四','五','六']" class="text-center font-bold">{{ w }}</div>
            <div v-for="d in 31" class="bg-white p-2 h-24 border rounded shadow-sm">
                <div class="font-bold border-b mb-1">7/{{ d }}</div>
                <div class="text-lg font-black">{{ getBooking(d) }}</div>
            </div>
        </div>
    </div>

    <script>
        const GIST_ID = "3cd74e6ce0f0041ea785c24fb7d210c9";
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const history = ref({});
                const isExpanded = ref(true);
                
                const fetchCloudData = async () => {
                    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                    const d = await res.json();
                    const fileName = Object.keys(d.files)[0];
                    history.value = JSON.parse(d.files[fileName].content);
                };

                onMounted(fetchCloudData);

                return { 
                    isExpanded,
                    getBooking: (d) => history.value[`07-${d<10?'0'+d:d}`]?.b2026 || '' 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
