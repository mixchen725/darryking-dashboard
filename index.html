<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>大大力分析儀表板 - 恢復穩定版</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dk-bg-yellow { background-color: #ffcc00; }
        .dk-text-yellow { color: #ffcc00; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ffcc00; }
    </style>
</head>
<body class="bg-gray-50 p-4 text-xs">
    <div id="app" class="max-w-7xl mx-auto space-y-4">
        <header class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-black flex justify-between items-center">
            <h1 class="font-black text-sm">📊 大大力業績分析</h1>
            <button @click="fetchCloudData" class="bg-black text-white px-3 py-1 rounded">🔄 同步</button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>昨日預約/取消</div><div class="font-black text-sm">{{ latestBooking }} / <span class="text-red-500">{{ latestCancel }}</span></div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>累計 YoY</div><div class="font-black text-sm">{{ monthYoY }}%</div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>累計取消率</div><div class="font-black text-sm text-red-500">{{ cancelRate }}%</div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>大盤達成率</div><div class="font-black text-sm">{{ achievement }}%</div></div>
            <div class="bg-white p-3 rounded-lg border shadow-sm"><div>落差值</div><div class="font-black text-sm">{{ gap }}%</div></div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm h-64">
            <canvas id="lineChart"></canvas>
        </div>

        <div class="bg-white rounded-xl border overflow-hidden">
            <div @click="isExpanded = !isExpanded" class="bg-black p-3 text-white font-black cursor-pointer">
                📅 每日台數觀測大盤 {{ isExpanded ? '[-]' : '[+]' }}
            </div>
            <div v-show="isExpanded" class="p-2 grid grid-cols-7 gap-1 bg-gray-100">
                <div v-for="d in 31" class="bg-white p-1 rounded border min-h-[60px]">
                    <div class="font-bold border-b">7/{{ d }}</div>
                    <div class="text-[10px]">{{ getBooking(d) }}</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GIST_ID = "3cd74e6ce0f0041ea785c24fb7d210c9";
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const history = ref({});
                const isExpanded = ref(false);
                
                const fetchCloudData = async () => {
                    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                    const d = await res.json();
                    history.value = JSON.parse(d.files["data.json"].content);
                    updateChart();
                };

                let chart = null;
                const updateChart = () => {
                    if(!chart) return;
                    const days = Object.keys(history.value).sort();
                    chart.data.labels = days.map(d => d.split('-')[1]);
                    chart.data.datasets[0].data = days.map(d => history.value[d].b2026);
                    chart.update();
                };

                onMounted(() => {
                    const ctx = document.getElementById('lineChart').getContext('2d');
                    chart = new Chart(ctx, { 
                        type: 'line', 
                        data: { labels: [], datasets: [{ label: '2026', data: [], borderColor: '#ffcc00' }] },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                    fetchCloudData();
                });

                return { 
                    isExpanded, fetchCloudData,
                    latestBooking: computed(() => Object.values(history.value).slice(-1)[0]?.b2026 || '-'),
                    latestCancel: computed(() => Object.values(history.value).slice(-1)[0]?.c2026 || '-'),
                    monthYoY: computed(() => '0.0'), cancelRate: computed(() => '0.0'), achievement: computed(() => '0.0'), gap: computed(() => '0.0'),
                    getBooking: (d) => history.value[`07-${d<10?'0'+d:d}`]?.b2026 || ''
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
